<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
   
    <title>ระบบนัดหมอโรงพยาบาล</title>
    <link rel="stylesheet" href="bbb.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <button onclick="openLogin()" class="login-btn">
            Sign Out
        </button>
    </div>
    <header class="main-header">
        <h1>ระบบนัดหมอโรงพยาบาล</h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav>
                <a href="#" class="nav-item active">ข้อมูลผู้ใช้</a>
                <a href="#" class="nav-item active">ข้อมูลแผนก</a>
                <a href="#" class="nav-item active">ข้อมูลหมอ</a>
            </nav>
        </aside>

        <main class="content">
            <div class="card">
                <div class="card-header">
                    <h2>ข้อมูลการนัดหมาย</h2>
                    <button class="btn btn-add" id="btnAddDepartment">+ เพิ่ม</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>แผนกของหมอ</th>
                                <th>รายชื่อหมอ</th>
                                <th>วัน/เดือน/ปี</th>
                                <th>เวลา</th>
                            </tr>
                        </thead>
                        <tbody id="departmentTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="bbb.js"></script>
</body>
</html>
