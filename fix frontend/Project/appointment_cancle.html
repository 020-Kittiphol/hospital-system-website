<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
<title>ยกเลิกการนัดหมาย</title>
</head>

<body>

    <header class="main-header">
        <h1>ระบบนัดแพทย์โรงพยาบาล</h1>
    </header>

    <div class="container">
<main class="content">
<div class="card">
<center>

<h2>ยกเลิกข้อมูลการนัดหมาย</h2>
<br>

<form onsubmit="cancelAppointment(event)">

<p>คุณต้องการยกเลิกการนัดหมายนี้ใช่หรือไม่?</p>

<br>

<button type="submit">ตกลง</button>
<button type="button" onclick="goBack()">ยกเลิก</button>

</form>

</center>
</div>
</main>
    </div>

    <script>

        function cancelAppointment(e){
        e.preventDefault();

        const id = new URLSearchParams(window.location.search).get("id");

        fetch("http://localhost:3000/appointments/" + id,{
        method:"DELETE"
        })
            .then(()=>{
             alert("ยกเลิกสำเร็จ");
            window.location.href="appointment.html";
        });
        }

        function goBack(){
         window.location.href="appointment.html";
        }

        </script>

</body>
</html>
